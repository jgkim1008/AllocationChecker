name: DCA Morning Overseas Cron

on:
  schedule:
    - cron: '30 13 * * 1-5'  # KST 22:30 (EDT, 여름)
    - cron: '30 14 * * 1-5'  # KST 23:30 (EST, 겨울)
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger DCA morning overseas
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ vars.NEXT_PUBLIC_APP_URL }}/api/auto-trade/dca/cron/morning?market=overseas" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "Response: $response"
          if [ "$response" != "200" ]; then
            echo "Cron failed with status $response"
            exit 1
          fi
